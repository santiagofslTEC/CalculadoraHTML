
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="app-header">
            <span class="app-title">CALCULATOR</span>
            <i class="fa-solid fa-gear"></i>
        </header>


        <section id="view-calc">
            <div class="main-container">
                <div class="main-screen">
                    <div class="screen-expression"  id="expression"></div>
                    <div class="screen-result"  id="screen">0</div>
                    

                </div>
                
                <div class="btn-container">
                    <button class="btn btn-util" onclick="handleClick('CE')">C</button>
                    <button class="btn btn-util" onclick="handleClick('+/-')">
                        <i class="fa-solid fa-plus-minus"></i>
                    </button>
                    <button class="btn btn-util" onclick="handleClick('^')">x^n</button>
                    <button class="btn btn-util" onclick="handleClick('⌫')">
                        <i class="fa-solid fa-delete-left"></i>
                    </button>
                </div>

                <div class="btn-container">
                    <button class="btn" onclick="handleClick(7)">7</button>
                    <button class="btn" onclick="handleClick(8)">8</button>
                    <button class="btn" onclick="handleClick(9)">9</button>
                    <button class="btn btn-operator" onclick="handleClick('/')">
                        <i class="fa-solid fa-divide"></i>
                    </button>
                </div>

                <div class="btn-container">
                    <button class="btn" onclick="handleClick(4)">4</button>
                    <button class="btn" onclick="handleClick(5)">5</button>
                    <button class="btn" onclick="handleClick(6)">6</button>
                    <button class="btn btn-operator" onclick="handleClick('x')">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="btn-container">
                    <button class="btn" onclick="handleClick(1)">1</button>
                    <button class="btn" onclick="handleClick(2)">2</button>
                    <button class="btn" onclick="handleClick(3)">3</button>
                    <button class="btn btn-operator" onclick="handleClick('-')">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                </div>
        
        

                <div class="btn-container">
                    <button class="btn" onclick="handleClick(0)">0</button>
                    <button class="btn" onclick="handleClick('.')">.</button>
                    <button class="btn btn-operator" onclick="handleClick('=')">
                        <i class="fa-solid fa-equals"></i>
                    </button>
                    <button class="btn btn-operator" onclick="handleClick('+')">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
        
            </div>

        </section>


        <section id="view-history" class="hidden">
            <div class="history-container">
                <div class="history-header">
                    <h2 class="history-title">Operations History</h2>
                    <button class="clear-history-btn" onclick="clearHistory()">CLEAR</button>
                </div>
                <ul class="history-list" id="history-list">
                    <li class="history-empty">No operations yet.</li>
                </ul>
            </div>
        </section>


        <nav class="bottom-nav">
            <button id="nav-calc" class="nav-btn active" onclick="switchView('calc')">CALC
                <i class="fa-solid fa-calculator"></i>
            </button>
            <button id="nav-history" class="nav-btn" onclick="switchView('history')">HISTORY
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
        </nav>
    </div>
        
    

    <script src="./script.js"></script>
</body>
</html>
